<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche de Mentor - IFRI MentorLink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #0A4992; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 10px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .badges-input { display: flex; flex-wrap: wrap; gap: 5px; border: 1px solid #ccc; border-radius: 5px; padding: 8px; min-height: 45px; align-items: center; margin-bottom: 15px; }
        .badges-input input { border: none; outline: none; flex: 1; min-width: 100px; margin-bottom: 0; }
        .badge { background: #5B9EF4; color: #fff; padding: 5px 12px; border-radius: 15px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .badge .remove { cursor: pointer; }
        button { background: linear-gradient(90deg, #0A4992, #03162C); color: #fff; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { opacity: 0.9; }
        .result-card { background: linear-gradient(90deg, #5B9EF4, #355C8E); color: #fff; border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .result-card h3 { margin-bottom: 10px; }
        .score { font-size: 24px; font-weight: bold; }
        .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .tag { background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 15px; font-size: 12px; }
        .no-result { text-align: center; color: #666; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Trouver un Mentor</h1>

        <!-- Formulaire -->
        <div class="card">
            <label>Compétences recherchées</label>
            <div class="badges-input" id="competencesInput">
                <div id="competencesTags"></div>
                <input type="text" id="competenceField" placeholder="Python, SQL..." onkeydown="addTag(event)">
            </div>
            <small style="color:#666;">Appuie sur Entrée pour ajouter</small>

            <label style="margin-top:15px;">Jour souhaité</label>
            <select id="jour">
                <option value="">Choisir</option>
                <option value="lundi">Lundi</option>
                <option value="mardi">Mardi</option>
                <option value="mercredi">Mercredi</option>
                <option value="jeudi">Jeudi</option>
                <option value="vendredi">Vendredi</option>
                <option value="samedi">Samedi</option>
            </select>

            <label>Heure souhaitée</label>
            <select id="heure">
                <option value="">Choisir une heure</option>
                <option value="8">08h00</option>
                <option value="8.5">08h30</option>
                <option value="9">09h00</option>
                <option value="9.5">09h30</option>
                <option value="10">10h00</option>
                <option value="10.5">10h30</option>
                <option value="11">11h00</option>
                <option value="11.5">11h30</option>
                <option value="12">12h00</option>
                <option value="12.5">12h30</option>
                <option value="13">13h00</option>
                <option value="13.5">13h30</option>
                <option value="14">14h00</option>
                <option value="14.5">14h30</option>
                <option value="15">15h00</option>
                <option value="15.5">15h30</option>
                <option value="16">16h00</option>
                <option value="16.5">16h30</option>
                <option value="17">17h00</option>
                <option value="17.5">17h30</option>
                <option value="18">18h00</option>
            </select>
            

            <label>Filière (optionnel)</label>
            <select id="filiere">
                <option value="">Toutes</option>
                <option value="GL">GL</option>
                <option value="IA">IA</option>
                <option value="SI">SI</option>
                <option value="IM">IM</option>
                <option value="SE&IoT">SE&IoT</option>
            </select>

            <button onclick="rechercher()">Rechercher</button>
        </div>

        <!-- Résultats -->
        <div id="resultats"></div>
    </div>

    <script>
        const competences = [];

        function addTag(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const field = document.getElementById('competenceField');
                const value = field.value.trim();
                if (value && !competences.includes(value)) {
                    competences.push(value);
                    renderTags();
                }
                field.value = '';
            }
        }

        function removeTag(value) {
            const index = competences.indexOf(value);
            if (index > -1) competences.splice(index, 1);
            renderTags();
        }

        function renderTags() {
            document.getElementById('competencesTags').innerHTML = competences.map(c =>
                `<span class="badge">${c} <span class="remove" onclick="removeTag('${c}')">×</span></span>`
            ).join('');
        }

        async function rechercher() {
            const jour = document.getElementById('jour').value;
            const heure = document.getElementById('heure').value;
            const filiere = document.getElementById('filiere').value;

            if (competences.length === 0 || !jour || !heure) {
                alert('Veuillez remplir les compétences, le jour et l\'heure.');
                return;
            }

            const body = {
                competences: competences,
                jour: jour,
                heure: parseFloat(heure),
                filiere: filiere
            };

            const response = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            const div = document.getElementById('resultats');

            if (data.length === 0) {
                div.innerHTML = '<div class="card no-result">Aucun mentor trouvé. Essayez d\'autres critères.</div>';
                return;
            }

            div.innerHTML = data.map(m => `
                <div class="result-card">
                    <h3>${m.nom} <span class="score">${m.score} pts</span></h3>
                    <p><strong>Filière :</strong> ${m.filiere} - ${m.niveau}</p>
                    <p><strong>Format :</strong> ${m.format}</p>
                    <div class="tags">
                        ${m.competences_communes.map(c => `<span class="tag">${c}</span>`).join('')}
                    </div>
                    <p style="margin-top:10px;"><strong>Disponibilités :</strong></p>
                    <ul style="margin-left:20px;">
                        ${m.disponibilites.map(d => `<li>${d.jour} : ${d.debut}h-${d.fin}h</li>`).join('')}
                    </ul>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
